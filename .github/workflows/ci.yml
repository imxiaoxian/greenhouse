name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Lint (critical only)
        run: ruff check . --select F --ignore F401,F403,F405,F841 || true

      - name: Check imports
        run: |
          python -c "from greenhouse_agent import config, graph, llm, nodes, state, tools"
          python -c "from weather_mcp import server"
