name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Lint
        run: ruff check . --select E,F,W --ignore E501

      - name: Check imports
        run: |
          python -c "from greenhouse_agent import config, graph, llm, nodes, state, tools"
          python -c "from weather_mcp import server"

      - name: Run e2e test
        env:
          DEEPSEEK_API_KEY: skip
          OPENWEATHER_API_KEY: skip
        run: python scripts/test_knowledge_e2e.py || echo "(e2e skipped — no API keys)"
